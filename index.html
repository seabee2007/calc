<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Theme colors for light and dark mode -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ConcreteCalc" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <title>ConcreteCalc - Concrete Calculator App</title>
    <meta name="description" content="Professional concrete calculator for construction and engineering projects." />
    <script>
      // #region agent log
      (function () {
        function log(hypothesisId, message, data) {
          fetch('http://127.0.0.1:7822/ingest/f8847b5c-ebf8-4ffb-8ef5-2ae8f29ce67d', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'd0c8c0' }, body: JSON.stringify({ sessionId: 'd0c8c0', runId: 'post-fix', hypothesisId: hypothesisId, location: 'index.html', message: message, data: data, timestamp: Date.now() }) }).catch(function () {});
        }
        log('H5,H6', 'HTML pre-module diagnostics', {
          path: location.pathname,
          serviceWorkerControlled: Boolean(navigator.serviceWorker && navigator.serviceWorker.controller),
          currentScriptSrc: document.currentScript && document.currentScript.src,
        });
        window.addEventListener('error', function (event) {
          log('H1,H5,H6', 'Pre-main runtime error', {
            path: location.pathname,
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
            scriptSrcs: Array.prototype.map.call(document.scripts, function (script) { return script.src; }).filter(Boolean),
            preloadHrefs: Array.prototype.map.call(document.querySelectorAll('link[rel="modulepreload"]'), function (link) { return link.href; }),
            serviceWorkerControlled: Boolean(navigator.serviceWorker && navigator.serviceWorker.controller),
          });
        });
      })();
      // #endregion
    </script>
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      html {
        height: -webkit-fill-available;
        background-color: #ffffff;
      }
      html.dark {
        background-color: #111827;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        width: 100%;
        overflow-x: hidden;
        background-color: #ffffff;
      }
      body.dark {
        background-color: #111827;
      }
      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        width: 100vw;
        display: flex;
        flex-direction: column;
        background-color: inherit;
      }
      /* Status bar area background for iOS */
      .status-bar-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        z-index: 9999;
      }
      .dark .status-bar-bg {
        background-color: rgba(17, 24, 39, 0.95);
      }
    </style>
  </head>
  <body>
    <div class="status-bar-bg"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
