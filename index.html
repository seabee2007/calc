<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ── Favicon ── -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#020617" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── iOS PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arden Project OS" />

    <!-- ── Primary metadata ── -->
    <title>Arden Project OS</title>
    <meta name="application-name" content="Arden Project OS" />
    <meta name="description" content="Professional construction project management for estimates, proposals, schedules, and field tracking." />

    <!-- ── Open Graph (iMessage, Facebook, Slack, LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Arden Project OS" />
    <meta property="og:title" content="Arden Project OS" />
    <meta property="og:description" content="Construction project software for estimates, proposals, schedules, and field tracking." />
    <meta property="og:url" content="https://app.ardenprojectos.com/" />
    <meta property="og:image" content="https://app.ardenprojectos.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Arden Project OS" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Arden Project OS" />
    <meta name="twitter:description" content="Construction project software for estimates, proposals, schedules, and field tracking." />
    <meta name="twitter:image" content="https://app.ardenprojectos.com/og-image.png" />
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      html {
        height: -webkit-fill-available;
        min-height: 100%;
        background-color: #111827;
      }
      html.dark {
        background-color: #111827;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        width: 100%;
        overflow-x: hidden;
        background-color: #111827;
      }
      body.dark {
        background-color: #111827;
      }
      #root {
        min-height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        width: 100vw;
        display: flex;
        flex-direction: column;
        background-color: inherit;
      }
      /* Status bar area background for iOS */
      .status-bar-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background-color: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        z-index: 9999;
      }
      .dark .status-bar-bg {
        background-color: rgba(17, 24, 39, 0.95);
      }
    </style>
  </head>
  <body>
    <div class="status-bar-bg"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
